name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: pyinstaller margin_mate.spec --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MarginMate-Windows
          path: dist/MarginMate/
          retention-days: 30
