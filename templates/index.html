<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Margin Mate</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<!-- ── Header ───────────────────────────────────────────────── -->
<header class="header">
  <div style="display:flex;align-items:center">
    <div class="header-brand">
      <img src="/static/logo.png" class="brand-logo" alt="Margin Mate" />
      <span class="brand-name">Margin Mate</span>
    </div>
    <nav class="tab-pills">
      <button class="tab-pill active" data-tab="orders"    onclick="App.switchTab('orders')">Orders</button>
      <button class="tab-pill"        data-tab="inventory" onclick="App.switchTab('inventory')">Inventory</button>
      <button class="tab-pill"        data-tab="sales"     onclick="App.switchTab('sales')">Sales</button>
      <button class="tab-pill"        data-tab="settings"  onclick="App.switchTab('settings')">Settings</button>
    </nav>
  </div>
  <div class="header-right">
    <span id="email-chip" class="email-chip idle">Idle</span>
    <button class="btn-sync" onclick="App.checkEmails()">
      <span id="sync-icon">⟳</span> Check Emails
    </button>
    <button class="btn btn-primary btn-sm" onclick="App.openOrderModal()">+ Order</button>
  </div>
</header>

<!-- ── Orders Tab ───────────────────────────────────────────── -->
<div id="tab-orders" class="tab-pane active">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div>
      <p class="sidebar-section-title">Overview</p>
      <button class="sidebar-btn active" data-filter="all"       onclick="App.setSidebarFilter('all',this)">
        <span class="sidebar-btn-left"><span>📋</span>All Orders</span>
        <span class="sidebar-count" id="sc-all">0</span>
      </button>
      <button class="sidebar-btn" data-filter="confirmed"  onclick="App.setSidebarFilter('confirmed',this)">
        <span class="sidebar-btn-left"><span>⏳</span>Confirmed</span>
        <span class="sidebar-count" id="sc-confirmed">0</span>
      </button>
      <button class="sidebar-btn" data-filter="shipped"    onclick="App.setSidebarFilter('shipped',this)">
        <span class="sidebar-btn-left"><span>🚚</span>Shipped</span>
        <span class="sidebar-count" id="sc-shipped">0</span>
      </button>
      <button class="sidebar-btn" data-filter="delivered"  onclick="App.setSidebarFilter('delivered',this)">
        <span class="sidebar-btn-left"><span>✅</span>Delivered</span>
        <span class="sidebar-count" id="sc-delivered">0</span>
      </button>
      <button class="sidebar-btn" data-filter="cancelled"  onclick="App.setSidebarFilter('cancelled',this)">
        <span class="sidebar-btn-left"><span>✕</span>Cancelled</span>
        <span class="sidebar-count" id="sc-cancelled">0</span>
      </button>
    </div>
    <div>
      <p class="sidebar-section-title">Merchants</p>
      <button class="sidebar-btn" data-merchant="all"     onclick="App.setSidebarMerchant('all',this)">
        <span class="sidebar-btn-left"><span>🌐</span>All Merchants</span>
      </button>
      <button class="sidebar-btn" data-merchant="Amazon"  onclick="App.setSidebarMerchant('Amazon',this)">
        <span class="sidebar-btn-left"><span>📦</span>Amazon</span>
      </button>
      <button class="sidebar-btn" data-merchant="Target"  onclick="App.setSidebarMerchant('Target',this)">
        <span class="sidebar-btn-left"><span>🛒</span>Target</span>
      </button>
      <button class="sidebar-btn" data-merchant="Kmart"   onclick="App.setSidebarMerchant('Kmart',this)">
        <span class="sidebar-btn-left"><span>🛍️</span>Kmart</span>
      </button>
      <button class="sidebar-btn" data-merchant="Shopify" onclick="App.setSidebarMerchant('Shopify',this)">
        <span class="sidebar-btn-left"><span>🏪</span>Shopify</span>
      </button>
      <button class="sidebar-btn" data-merchant="BigW"    onclick="App.setSidebarMerchant('BigW',this)">
        <span class="sidebar-btn-left"><span>🏬</span>BigW</span>
      </button>
    </div>
  </aside>

  <!-- Main orders area -->
  <div class="main">
    <div class="stat-row" id="order-stats"></div>

    <div class="toolbar">
      <div class="toolbar-left">
        <input id="f-search" class="input" placeholder="Search orders, items…" style="width:260px" oninput="App.debounce(App.loadOrders,300)()" />
      </div>
    </div>

    <div id="orders-list"></div>
  </div>
</div>

<!-- ── Inventory Tab ─────────────────────────────────────────── -->
<div id="tab-inventory" class="tab-pane">
  <div class="page-wrap">
    <div class="stat-row" id="inv-stats"></div>

    <div class="toolbar">
      <div class="toolbar-left">
        <div class="subtab-bar">
          <button class="subtab-btn active" id="inv-subtab-inventory" onclick="App.switchInvSubtab('inventory')">
            Inventory
          </button>
          <button class="subtab-btn" id="inv-subtab-sales" onclick="App.switchInvSubtab('sales')">
            Sales History
          </button>
        </div>
      </div>
      <div id="inv-action-btn"></div>
    </div>

    <!-- Inventory list -->
    <div id="inventory-list"></div>

    <!-- Sales list (hidden initially) -->
    <div id="inv-sales-wrap" style="display:none">
      <div class="sales-header">
        <span>Item</span><span>Platform</span>
        <span style="text-align:right">Revenue</span>
        <span style="text-align:right">Profit</span>
        <span style="text-align:right">Cost</span>
        <span>Date</span>
        <span></span>
      </div>
      <div id="sales-list" style="display:flex;flex-direction:column;gap:6px;margin-top:8px"></div>
    </div>
  </div>
</div>

<!-- ── Sales Tab (redirects to inventory/sales subtab) ──────── -->
<div id="tab-sales" class="tab-pane">
  <div class="page-wrap">
    <div class="stat-row" id="sales-stats"></div>
    <div class="toolbar">
      <div class="toolbar-left"></div>
      <button class="btn btn-success" onclick="App.openSaleModal()">+ Record Sale</button>
    </div>
    <div class="sales-header">
      <span>Item</span><span>Platform</span>
      <span style="text-align:right">Revenue</span>
      <span style="text-align:right">Profit</span>
      <span style="text-align:right">Cost</span>
      <span>Date</span>
      <span></span>
    </div>
    <div id="sales-list2" style="display:flex;flex-direction:column;gap:6px;margin-top:8px"></div>
  </div>
</div>

<!-- ── Settings Tab ──────────────────────────────────────────── -->
<div id="tab-settings" class="tab-pane">
  <div class="page-wrap">
    <div class="settings-grid">

      <div class="card">
        <h3 class="card-title">IMAP Configuration</h3>
        <form id="imap-form" onsubmit="App.saveConfig(event)">
          <div class="form-group">
            <label class="label">IMAP Host</label>
            <input id="cfg-host" class="input input-full" placeholder="imap.gmail.com" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="label">Port</label>
              <input id="cfg-port" class="input input-full" type="number" placeholder="993" />
            </div>
            <div class="form-group">
              <label class="label">Check Interval (s)</label>
              <input id="cfg-interval" class="input input-full" type="number" placeholder="300" />
            </div>
          </div>
          <div class="form-group">
            <label class="label">Email / Username</label>
            <input id="cfg-user" class="input input-full" type="email" />
          </div>
          <div class="form-group">
            <label class="label">App Password</label>
            <input id="cfg-pass" class="input input-full" type="password" placeholder="••••••••" />
            <p class="hint">Gmail requires an <strong>App Password</strong> — not your account password.</p>
          </div>
          <div class="form-group">
            <label class="label">Scan back (days)</label>
            <input id="cfg-days" class="input input-full" type="number" placeholder="30" />
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Configuration</button>
          </div>
        </form>
      </div>

      <div>
        <div class="card" style="margin-bottom:16px">
          <h3 class="card-title">Email Check</h3>
          <div id="email-check-info"></div>
          <div class="form-actions" style="margin-top:16px">
            <button class="btn btn-ghost" onclick="App.checkEmails()">⟳ Check Now</button>
          </div>
        </div>

<div class="card">
          <h3 class="card-title">Merchants</h3>
          <div id="merchant-toggles"></div>
          <div class="form-actions">
            <button class="btn btn-ghost" onclick="App.saveMerchants()">Save Merchants</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ── Toast container ──────────────────────────────────────── -->
<div id="toast-container"></div>

<!-- ── Modal ────────────────────────────────────────────────── -->
<div id="modal-overlay" class="overlay hidden" onclick="App.closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h2 id="modal-title"></h2>
      <button class="modal-close" onclick="App.closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
